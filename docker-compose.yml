services:
  db:
    image: postgres:16
    container_name: revlog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: revlog
      POSTGRES_PASSWORD: revlog
      POSTGRES_DB: revlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
